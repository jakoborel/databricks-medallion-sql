# This is a basic workflow to help you get started with Actions

name: CI - Validate Databricks Bundle

# Controls when the workflow will run
on:
  # Triggers the workflow on pull request events but only for the "main" branch with changes to databricks_medallion_sql or workflows folders.
  pull_request:
    branches: [ "main" ]
    paths:
      - "databricks_medallion_sql/**"
      - ".github/workflows/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # If you're using OIDC, you still need id-token permission even for plan/validate
    permissions:
      contents: read
      id-token: write

    env:
      # OIDC auth (recommended)
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      # If using PAT instead, comment the 3 env vars above and uncomment below:
      # DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      # DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Bundle validate (dev target)
        working-directory: databricks_medallion_sql
        run: databricks bundle validate -t dev

      - name: Bundle plan (dev target)
        working-directory: databricks_medallion_sql
        run: databricks bundle plan -t dev -o json > bundle-plan-dev.json

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-plan-dev
          path: databricks_medallion_sql/bundle-plan-dev.json
