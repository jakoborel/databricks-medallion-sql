# This is a Databricks asset bundle definition for databricks_medallion_sql.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_medallion_sql
  uuid: a33e4ba8-9ab2-467b-8544-f5b2462d2bc0

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  warehouse_id:
    description: The warehouse to use
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-2d5e8000-65da.cloud.databricks.com
    variables:
      warehouse_id: 5938af52334fdf65
      catalog: dev
      schema: brazil_ecommerce_bronze

  prod:
    mode: production
    workspace:
      host: https://dbc-2d5e8000-65da.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/jakoborel@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jakoborel@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      warehouse_id: 5938af52334fdf65
      catalog: dev
      schema: brazil_ecommerce_bronze
    permissions:
      - user_name: jakoborel@gmail.com
        level: CAN_MANAGE
